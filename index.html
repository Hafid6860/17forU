<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Sweet Seventeen – Adinda Revalina Charissa Putri</title>

  <!-- Google Fonts: Playfair Display (serif elegan) + Cormorant Garamond + Poppins (sans-serif bersih) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* =============================================
       CSS VARIABLES – Palet Warna & Token Desain
    ============================================= */
    :root {
      --rose-gold:       #c9956c;
      --rose-gold-light: #e8c4a8;
      --rose-gold-pale:  #f5e6da;
      --cream:           #fdf6ee;
      --cream-dark:      #f0e4d4;
      --midnight:        #1a1018;
      --plum:            #3b1f2b;
      --gold:            #c4a882;
      --gold-soft:       #d4bc98;
      --text-dark:       #2c1a24;
      --text-mid:        #5a3d4a;
      --text-light:      #8a6a78;
      --white-glass:     rgba(255, 255, 255, 0.72);
      --shadow-warm:     0 8px 40px rgba(180, 100, 80, 0.15);
      --shadow-card:     0 20px 60px rgba(60, 20, 40, 0.12), 0 4px 16px rgba(60, 20, 40, 0.08);
    }

    /* =============================================
       RESET & BASE
    ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--cream);
      color: var(--text-dark);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* =============================================
       LATAR BELAKANG – Gradien Halus + Ornamen SVG
    ============================================= */

    /* Gradien latar utama */
    .bg-gradient {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%,  #f7e8dc 0%, transparent 60%),
        radial-gradient(ellipse 70% 70% at 85% 90%,  #f0dcd0 0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 50% 50%,  #fdf2e8 0%, transparent 80%),
        linear-gradient(160deg, #fdf6ee 0%, #f5e0d0 50%, #fdf0e8 100%);
    }

    /* Ornamen SVG dekoratif – sudut kiri atas */
    .ornament-tl,
    .ornament-br,
    .ornament-tr,
    .ornament-bl {
      position: fixed;
      z-index: 1;
      pointer-events: none;
      opacity: 0.38;
    }
    .ornament-tl { top: 0;    left: 0;   width: clamp(110px, 32vw, 200px); }
    .ornament-br { bottom: 0; right: 0;  width: clamp(110px, 32vw, 200px); transform: rotate(180deg); }
    .ornament-tr { top: 0;    right: 0;  width: clamp(70px, 20vw, 130px);  transform: scaleX(-1); }
    .ornament-bl { bottom: 0; left: 0;   width: clamp(70px, 20vw, 130px);  transform: scaleY(-1); }

    /* =============================================
       WRAPPER UTAMA
    ============================================= */
    .page-wrapper {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(32px, 8vw, 64px) clamp(16px, 5vw, 32px) clamp(40px, 10vw, 80px);
      gap: clamp(24px, 6vw, 48px);
    }

    /* =============================================
       GARIS EMAS DEKORATIF (divider)
    ============================================= */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 340px;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }
    .divider-diamond {
      width: 6px; height: 6px;
      background: var(--rose-gold);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* =============================================
       HEADER SECTION
    ============================================= */
    .header {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(8px, 2.5vw, 16px);
      animation: fadeSlideDown 1.2s ease both;
    }

    /* "17" besar di belakang sebagai watermark */
    .header-seventeen {
      font-family: 'Playfair Display', serif;
      font-size: clamp(96px, 28vw, 200px);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--rose-gold-pale) 0%, var(--cream-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      user-select: none;
      letter-spacing: -4px;
      margin-bottom: -clamp(24px, 7vw, 60px);
      position: relative;
      z-index: 0;
    }

    .header-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(13px, 3.5vw, 17px);
      font-weight: 300;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--rose-gold);
      position: relative;
      z-index: 1;
    }

    .header-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(22px, 6.5vw, 42px);
      font-weight: 700;
      line-height: 1.2;
      color: var(--plum);
      position: relative;
      z-index: 1;
      text-shadow: 0 2px 12px rgba(60,20,40,0.08);
    }

    .header-name em {
      font-style: italic;
      color: var(--rose-gold);
    }

    .header-date {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(13px, 3.6vw, 18px);
      font-weight: 400;
      letter-spacing: 0.12em;
      color: var(--text-light);
      position: relative;
      z-index: 1;
    }

    /* =============================================
       KARTU UCAPAN (Glass Morphism)
    ============================================= */
    .card {
      background: var(--white-glass);
      backdrop-filter: blur(14px) saturate(1.4);
      -webkit-backdrop-filter: blur(14px) saturate(1.4);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 24px;
      padding: clamp(24px, 7vw, 48px) clamp(20px, 6vw, 40px);
      box-shadow: var(--shadow-card);
      max-width: 520px;
      width: 100%;
      position: relative;
      overflow: hidden;
      animation: fadeSlideUp 1.4s 0.3s ease both;
    }

    /* Aksen sudut kartu */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 60px; height: 60px;
      border-top: 2px solid var(--rose-gold-light);
      border-left: 2px solid var(--rose-gold-light);
      border-radius: 24px 0 0 0;
    }
    .card::after {
      content: '';
      position: absolute;
      bottom: 0; right: 0;
      width: 60px; height: 60px;
      border-bottom: 2px solid var(--rose-gold-light);
      border-right: 2px solid var(--rose-gold-light);
      border-radius: 0 0 24px 0;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(17px, 4.8vw, 26px);
      font-weight: 700;
      font-style: italic;
      color: var(--plum);
      text-align: center;
      margin-bottom: clamp(12px, 3.5vw, 20px);
    }

    /* Teks ucapan */
    .card-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(15px, 4.2vw, 19px);
      font-weight: 400;
      line-height: 1.9;
      color: var(--text-mid);
      text-align: justify;
      hyphens: auto;
    }
    .card-text p + p { margin-top: 1em; }

    /* Tanda tangan bawah kartu */
    .card-signature {
      margin-top: clamp(16px, 4vw, 28px);
      text-align: right;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(13px, 3.5vw, 16px);
      color: var(--rose-gold);
    }

    /* =============================================
       BAGIAN BAWAH – TOMBOL KADO
    ============================================= */
    .footer-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(16px, 4vw, 24px);
      width: 100%;
      max-width: 360px;
      animation: fadeSlideUp 1.4s 0.6s ease both;
    }

    /* Tombol utama */
    .btn-gift {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: clamp(14px, 4vw, 18px) clamp(24px, 6vw, 36px);
      background: linear-gradient(135deg, var(--plum) 0%, #5c2c3e 50%, var(--plum) 100%);
      background-size: 200% auto;
      color: var(--rose-gold-light);
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(16px, 4.5vw, 20px);
      font-weight: 600;
      letter-spacing: 0.06em;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 30px rgba(58, 20, 42, 0.35), inset 0 1px 0 rgba(255,255,255,0.12);
      transition: background-position 0.5s ease, transform 0.2s ease, box-shadow 0.3s ease;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-gift::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(201,149,108,0.2), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .btn-gift:hover { background-position: right center; }
    .btn-gift:hover::before { opacity: 1; }
    .btn-gift:active { transform: scale(0.97); box-shadow: 0 3px 16px rgba(58,20,42,0.3); }

    .btn-icon { font-size: clamp(18px, 5vw, 22px); display: inline-block; }

    /* Status tombol setelah ditekan */
    .btn-gift.activated {
      background: linear-gradient(135deg, var(--rose-gold) 0%, #b07850 100%);
      color: #fff;
      cursor: default;
    }

    /* =============================================
       PESAN KEJUTAN (Fade-In Overlay)
       Muncul di tengah layar saat tombol ditekan
    ============================================= */
    .surprise-message {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.85);
      z-index: 100;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.34,1.56,0.64,1);
      width: min(90vw, 420px);
      padding: clamp(24px,6vw,40px) clamp(20px,5vw,36px);
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border: 1.5px solid var(--rose-gold-light);
      border-radius: 28px;
      box-shadow: 0 30px 80px rgba(58,20,42,0.25), 0 0 0 6px rgba(201,149,108,0.1);
    }
    .surprise-message.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      pointer-events: auto;
    }

    .surprise-emoji { font-size: clamp(32px, 10vw, 52px); margin-bottom: 8px; display: block; }

    .surprise-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(20px, 5.5vw, 30px);
      font-weight: 700;
      font-style: italic;
      color: var(--plum);
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .surprise-sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(15px, 4.2vw, 20px);
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--rose-gold);
      margin-bottom: 16px;
    }

    .surprise-close {
      display: inline-block;
      margin-top: 4px;
      padding: 8px 24px;
      background: var(--plum);
      color: var(--rose-gold-light);
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(13px, 3.8vw, 16px);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.08em;
    }

    /* =============================================
       HUJAN BUNGA – Canvas Kelopak
       Kelopak dibuat sebagai div yang dianimasikan JS
    ============================================= */
    #petal-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      overflow: hidden;
    }

    /* Setiap kelopak bunga */
    .petal {
      position: absolute;
      top: -60px;
      border-radius: 50% 0 50% 0;
      animation: fall linear forwards;
      will-change: transform, opacity;
    }

    /* =============================================
       OVERLAY GELAP (saat pesan kejutan muncul)
    ============================================= */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(26, 10, 24, 0.45);
      backdrop-filter: blur(3px);
      z-index: 90;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    .overlay.show { opacity: 1; pointer-events: auto; }

    /* =============================================
       ANIMASI KEYFRAMES
    ============================================= */

    /* Kelopak jatuh */
    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.9; }
      80%  { opacity: 0.7; }
      100% { transform: translateY(110vh) rotate(540deg) scale(0.6); opacity: 0; }
    }

    /* Fade + slide dari atas */
    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Fade + slide dari bawah */
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Kedip halus pada judul header */
    @keyframes shimmer {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.75; }
    }

    /* =============================================
       RESPONSIF – Penyesuaian untuk layar lebih besar
    ============================================= */
    @media (min-width: 600px) {
      .card { border-radius: 32px; }
    }
  </style>
</head>

  <!-- ==============================

  <script>
    // ────────────────────────────────────────────────
    // KONFIGURASI KELOPAK BUNGA
    // ────────────────────────────────────────────────

    // Warna kelopak yang akan digunakan (rose gold, pink, krem)
    const PETAL_COLORS = [
      '#f2a7b8', // pink muda
      '#e8c4c4', // ros muda
      '#f5c6d0', // blush
      '#f9dde0', // pink pucat
      '#e8b4c8', // mauve
      '#fce4ec', // pink sangat muda
      '#d4a5b0', // dusty rose
      '#f0cdd5', // rose cream
    ];

    // Ukuran dan durasi kelopak
    const PETAL_SIZES   = [12, 16, 20, 14, 18]; // px
    const FALL_DURATION = [4, 5, 6, 7, 8];       // detik
    const TOTAL_PETALS  = 80;                      // jumlah kelopak per sesi

    // ────────────────────────────────────────────────
    // FUNGSI: Membuat satu kelopak bunga dan animasinya
    // ────────────────────────────────────────────────
    function createPetal() {
      const container = document.getElementById('petal-container');
      const petal     = document.createElement('div');
      petal.classList.add('petal');

      // Pilih atribut acak
      const color    = PETAL_COLORS[Math.floor(Math.random() * PETAL_COLORS.length)];
      const size     = PETAL_SIZES[Math.floor(Math.random() * PETAL_SIZES.length)];
      const duration = FALL_DURATION[Math.floor(Math.random() * FALL_DURATION.length)];
      const delay    = Math.random() * 3;           // tunda acak 0–3 detik
      const leftPos  = Math.random() * 100;         // posisi horizontal acak
      const opacity  = 0.6 + Math.random() * 0.4;  // transparansi acak

      // Terapkan gaya CSS ke kelopak
      petal.style.cssText = `
        left: ${leftPos}vw;
        width: ${size}px;
        height: ${size * 0.7}px;
        background: ${color};
        opacity: ${opacity};
        box-shadow: 0 1px 4px rgba(0,0,0,0.07);
        animation-duration: ${duration}s;
        animation-delay: ${delay}s;
        transform: rotate(${Math.random() * 360}deg);
      `;

      container.appendChild(petal);

      // Hapus elemen kelopak setelah animasinya selesai agar DOM tetap bersih
      petal.addEventListener('animationend', () => petal.remove(), { once: true });
    }

    // ────────────────────────────────────────────────
    // FUNGSI: Mulai hujan kelopak (memanggil createPetal berulang)
    // ────────────────────────────────────────────────
    function startPetalRain() {
      // Buat TOTAL_PETALS kelopak dengan jeda waktu singkat antar-kelopak
      // agar terasa natural dan tidak sekaligus
      for (let i = 0; i < TOTAL_PETALS; i++) {
        setTimeout(createPetal, i * 80); // satu kelopak tiap ~80ms
      }
    }

    // ────────────────────────────────────────────────
    // FUNGSI: Tampilkan pesan kejutan fade-in
    // ────────────────────────────────────────────────
    function showSurpriseMessage() {
      const msg     = document.getElementById('surpriseMsg');
      const overlay = document.getElementById('overlay');

      // Tampilkan overlay gelap terlebih dahulu
      overlay.classList.add('show');

      // Tampilkan pesan kejutan (CSS transition akan membuat fade-in)
      requestAnimationFrame(() => {
        msg.classList.add('show');
      });

      // Fokus ke tombol tutup agar aksesibel
      setTimeout(() => {
        document.getElementById('closeBtn').focus();
      }, 500);
    }

    // ────────────────────────────────────────────────
    // FUNGSI: Tutup pesan kejutan
    // ────────────────────────────────────────────────
    function closeSurprise() {
      document.getElementById('surpriseMsg').classList.remove('show');
      document.getElementById('overlay').classList.remove('show');
    }

    // Tutup saat overlay diklik
    document.getElementById('overlay').addEventListener('click', closeSurprise);

    // Tutup dengan tombol Escape di keyboard
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeSurprise();
    });

    // ────────────────────────────────────────────────
    // FUNGSI UTAMA: Aktifkan semua efek saat tombol ditekan
    // ────────────────────────────────────────────────
    function activateGift() {
      const btn     = document.getElementById('giftBtn');
      const btnText = document.getElementById('btnText');

      // Cegah tombol ditekan berulang kali
      if (btn.classList.contains('activated')) return;

      // 1. Tandai tombol sebagai sudah aktif & ubah teksnya
      btn.classList.add('activated');
      btn.setAttribute('aria-disabled', 'true');
      btn.querySelector('.btn-icon').textContent = '';
      btnText.textContent = 'HBD';

      // 2. Mulai hujan kelopak bunga
      startPetalRain();

      // 3. Tampilkan pesan kejutan setelah 0.6 detik
      //    (sedikit tunda agar kelopak terlihat dulu)
      setTimeout(showSurpriseMessage, 600);
    }
  </script>

</body>
</html>
