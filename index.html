<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 – Not Found</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #fff;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .code {
      font-size: clamp(80px, 20vw, 140px);
      font-weight: 500;
      color: #ccc;
      line-height: 1;
      letter-spacing: -4px;
    }

    hr {
      width: 100%;
      max-width: 320px;
      border: none;
      border-top: 1px solid #e5e5e5;
      margin: 1.5rem auto;
    }

    .title {
      font-size: clamp(14px, 3.5vw, 16px);
      letter-spacing: 0.04em;
      margin-bottom: 0.4rem;
    }

    .sub {
      font-size: clamp(12px, 3vw, 13px);
      color: #888;
      letter-spacing: 0.06em;
      margin-bottom: 2rem;
    }

    .note {
      font-size: clamp(11px, 2.8vw, 13px);
      color: #bbb;
      font-style: italic;
    }
  </style>
</head>
<body>
  <p class="code">404</p>
  <hr />
  <p class="title">Not Found</p>
  <p class="sub">Shutdown by Creator</p>
  <hr />
  <p class="note">Happy 17, btw.</p>
</body>
</html>
